```
<section class="card">

  <h2>Ajouter une catégorie</h2>

  <form id="categorie-form" class="form-grid">

    <input type="text" id="nom" placeholder="Nom de la catégorie" required />

    <button type="submit">Ajouter</button>

  </form>

  <p id="categorie-message" class="message"></p>

</section>

<section class="card">

  <div class="toolbar">

    <h2>Liste des catégories</h2>

    <button id="reload-categories">Actualiser</button>

  </div>

  <div class="table-wrapper">

    <table>

      <thead>
        <tr>
          <th>ID</th>
          <th>Nom</th>
        </tr>
      </thead>

      <tbody id="categories-body">
        <tr><td colspan="2">Chargement...</td></tr>
      </tbody>

    </table>

  </div>

</section>
