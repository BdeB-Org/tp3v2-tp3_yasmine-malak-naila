<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projet Commande - Clients</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <div>
      <h1>Gestion des clients</h1>
      <p class="subtitle">Consultation, ajout et suppression</p>
    </div>
    <nav>
      <a href="index.html">Accueil</a>
      <a href="clients.html" class="active">Clients</a>
      <a href="produits.html">Produits</a>
      <a href="utilisateurs.html">Utilisateurs</a>
      <a href="paniers.html">Paniers</a>
    </nav>
  </header>

  <main class="container">
    <section class="card">
      <h2>Ajouter un client</h2>
      <form id="client-form" class="form-grid">
        <input type="text" id="nom" placeholder="Nom du client" required />
        <input type="text" id="telephone" placeholder="Téléphone" />
        <input type="email" id="courriel" placeholder="Courriel" />
        <button type="submit">Ajouter</button>
      </form>
      <p id="client-message" class="message"></p>
    </section>

    <section class="card">
      <div class="toolbar">
        <h2>Liste des clients</h2>
        <button id="reload-clients">Actualiser</button>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Nom</th>
              <th>Téléphone</th>
              <th>Courriel</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="clients-body">
            <tr><td colspan="6">Chargement...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/shared.js"></script>
  <script src="js/clients.js"></script>
</body>
</html>
